spring:
  application:
    name: terimbere-budget
  
  # Database Configurations
  datasource:
    url: jdbc:postgresql://localhost:5432/terimbere_db
    username: postgres
    password: noah
    driver-class-name: org.postgresql.Driver
  
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Servlet & Server configuration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  error:
    include-message: always

# Custom application security details (JWT & File Storage)
app:
  jwt:
    # 512-bit HS512 base64 encoded secret key (generated securely)
    secret: 9a6Z9a6Z9a6Z9a6Z9a6Z9a6Z9a6Z9a6Z9a6Z9a6Z9a6Z9a6Z9a6Z9a6Z9a6Z9a6Z
    expiration-ms: 3600000 # 1 hour
    refresh-expiration-ms: 604800000 # 7 days
  upload:
    dir: c:/Users/HP/Desktop/ProductionProjects/Terimbere/uploads

# OpenAPI / Swagger UI Custom Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    tagsSorter: alpha
